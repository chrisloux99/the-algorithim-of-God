<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Algorithm of Belief - Book Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .cover {
    width: 6in;
    height: 9in;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #1a0a0a 0%, #0a0505 40%, #050202 70%, #000000 100%);
    box-shadow: 0 0 80px rgba(139, 0, 0, 0.3), inset 0 0 120px rgba(0,0,0,0.8);
  }

  /* Dark vignette overlay */
  .cover::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
    z-index: 10;
    pointer-events: none;
  }

  /* Noise texture overlay */
  .cover::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    z-index: 11;
    pointer-events: none;
    opacity: 0.5;
  }

  /* Neural network SVG container */
  .neural-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  /* Glowing cross */
  .cross-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 5;
  }

  .cross-vertical {
    position: absolute;
    width: 8px;
    height: 280px;
    background: linear-gradient(180deg, 
      rgba(180, 30, 30, 0.1) 0%,
      rgba(200, 40, 40, 0.6) 20%,
      rgba(220, 50, 50, 0.9) 40%,
      rgba(255, 60, 60, 1) 50%,
      rgba(220, 50, 50, 0.9) 60%,
      rgba(200, 40, 40, 0.6) 80%,
      rgba(180, 30, 30, 0.1) 100%
    );
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 
      0 0 15px rgba(255, 0, 0, 0.5),
      0 0 40px rgba(200, 0, 0, 0.3),
      0 0 80px rgba(150, 0, 0, 0.2),
      0 0 120px rgba(100, 0, 0, 0.1);
    border-radius: 2px;
  }

  .cross-horizontal {
    position: absolute;
    width: 180px;
    height: 8px;
    background: linear-gradient(90deg, 
      rgba(180, 30, 30, 0.1) 0%,
      rgba(200, 40, 40, 0.6) 20%,
      rgba(220, 50, 50, 0.9) 40%,
      rgba(255, 60, 60, 1) 50%,
      rgba(220, 50, 50, 0.9) 60%,
      rgba(200, 40, 40, 0.6) 80%,
      rgba(180, 30, 30, 0.1) 100%
    );
    left: 50%;
    top: 38%;
    transform: translate(-50%, -50%);
    box-shadow: 
      0 0 15px rgba(255, 0, 0, 0.5),
      0 0 40px rgba(200, 0, 0, 0.3),
      0 0 80px rgba(150, 0, 0, 0.2);
    border-radius: 2px;
  }

  /* Neural network nodes on the cross */
  .node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ff3333;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff0000, 0 0 20px rgba(255,0,0,0.5);
    z-index: 6;
  }

  .node.large {
    width: 10px;
    height: 10px;
    box-shadow: 0 0 12px #ff0000, 0 0 30px rgba(255,0,0,0.6), 0 0 60px rgba(255,0,0,0.3);
  }

  .node.dim {
    background: #991111;
    box-shadow: 0 0 4px #660000, 0 0 10px rgba(150,0,0,0.3);
    width: 4px;
    height: 4px;
  }

  /* Connection lines between nodes */
  .connection {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,50,50,0.6), rgba(255,50,50,0.1));
    transform-origin: left center;
    z-index: 4;
  }

  .connection.vertical {
    width: 1px;
    height: auto;
    background: linear-gradient(180deg, rgba(255,50,50,0.6), rgba(255,50,50,0.1));
    transform-origin: top center;
  }

  /* Text elements */
  .title-container {
    position: absolute;
    top: 6%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 15;
  }

  .title-the {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(200, 160, 120, 0.7);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: 32px;
    color: #c8a882;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1.2;
    text-shadow: 
      0 0 20px rgba(200, 50, 50, 0.4),
      0 0 40px rgba(150, 30, 30, 0.2),
      0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 6px;
  }

  .title-of {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 16px;
    color: rgba(200, 160, 120, 0.6);
    letter-spacing: 12px;
    margin-bottom: 6px;
  }

  .title-belief {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: 44px;
    color: #d4b896;
    letter-spacing: 6px;
    text-transform: uppercase;
    line-height: 1.1;
    text-shadow: 
      0 0 30px rgba(200, 50, 50, 0.5),
      0 0 60px rgba(150, 30, 30, 0.3),
      0 3px 6px rgba(0,0,0,0.9);
  }

  .subtitle-container {
    position: absolute;
    bottom: 18%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 15;
  }

  .subtitle-line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 160, 120, 0.4), transparent);
    margin: 0 auto 14px;
  }

  .subtitle-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(200, 160, 120, 0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .subtitle-finding {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 15px;
    color: rgba(220, 180, 140, 0.7);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .subtitle-god {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 20px;
    color: #c8a882;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: 0 0 20px rgba(200, 50, 50, 0.3);
  }

  .subtitle-innovation {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 15px;
    color: rgba(220, 180, 140, 0.7);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Author */
  .author-container {
    position: absolute;
    bottom: 5%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 15;
  }

  .author-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 160, 120, 0.3), transparent);
    margin: 0 auto 10px;
  }

  .author-text {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    color: #c8a882;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(200, 50, 50, 0.4), 0 2px 4px rgba(0,0,0,0.8);
  }

  /* Particle effects - floating red dots */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,50,50,0.8), transparent);
    z-index: 3;
    animation: float 8s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { opacity: 0.3; transform: translateY(0px); }
    50% { opacity: 0.8; transform: translateY(-10px); }
  }

  /* Blood drip effect at top */
  .drip {
    position: absolute;
    top: 0;
    width: 3px;
    background: linear-gradient(180deg, rgba(180,20,20,0.8), rgba(120,10,10,0.4), transparent);
    border-radius: 0 0 2px 2px;
    z-index: 12;
  }

  /* Edge burn effect */
  .edge-burn {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
    z-index: 12;
    pointer-events: none;
  }

  /* Scanline effect */
  .scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    z-index: 13;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="cover">
  <!-- Neural network background -->
  <svg class="neural-bg" viewBox="0 0 432 648" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="glow" cx="50%" cy="45%" r="50%">
        <stop offset="0%" style="stop-color:rgba(180,30,30,0.15)"/>
        <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
      </radialGradient>
      <filter id="blur">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>
    </defs>
    
    <!-- Background glow -->
    <rect width="432" height="648" fill="url(#glow)"/>
    
    <!-- Neural network connections - radiating from cross center -->
    <g stroke="rgba(180,30,30,0.15)" stroke-width="0.5" fill="none">
      <!-- Upper left cluster -->
      <line x1="216" y1="290" x2="80" y2="120"/>
      <line x1="80" y2="120" x2="50" y2="80"/>
      <line x1="80" y1="120" x2="120" y2="60"/>
      <line x1="50" y1="80" x2="30" y2="140"/>
      <line x1="120" y1="60" x2="160" y2="90"/>
      <line x1="160" y1="90" x2="216" y2="150"/>
      <line x1="30" y1="140" x2="70" y2="180"/>
      <line x1="70" y1="180" x2="130" y2="200"/>
      
      <!-- Upper right cluster -->
      <line x1="216" y1="290" x2="350" y2="130"/>
      <line x1="350" y1="130" x2="380" y2="90"/>
      <line x1="350" y1="130" x2="310" y2="70"/>
      <line x1="380" y1="90" x2="400" y2="150"/>
      <line x1="310" y1="70" x2="270" y2="100"/>
      <line x1="270" y1="100" x2="216" y2="150"/>
      <line x1="400" y1="150" x2="360" y2="190"/>
      <line x1="360" y1="190" x2="300" y2="210"/>
      
      <!-- Lower left cluster -->
      <line x1="216" y1="290" x2="90" y2="400"/>
      <line x1="90" y1="400" x2="50" y2="450"/>
      <line x1="90" y1="400" x2="130" y2="470"/>
      <line x1="50" y1="450" x2="80" y2="520"/>
      <line x1="130" y1="470" x2="170" y2="510"/>
      <line x1="80" y1="520" x2="140" y2="550"/>
      <line x1="170" y1="510" x2="200" y2="560"/>
      
      <!-- Lower right cluster -->
      <line x1="216" y1="290" x2="340" y2="410"/>
      <line x1="340" y1="410" x2="380" y2="460"/>
      <line x1="340" y1="410" x2="300" y2="480"/>
      <line x1="380" y1="460" x2="350" y2="530"/>
      <line x1="300" y1="480" x2="260" y2="520"/>
      <line x1="350" y1="530" x2="290" y2="560"/>
      <line x1="260" y1="520" x2="230" y2="570"/>
      
      <!-- Cross connections -->
      <line x1="216" y1="150" x2="136" y2="246"/>
      <line x1="216" y1="150" x2="296" y2="246"/>
      <line x1="136" y1="246" x2="136" y2="334"/>
      <line x1="296" y1="246" x2="296" y2="334"/>
      <line x1="136" y1="334" x2="216" y2="430"/>
      <line x1="296" y1="334" x2="216" y2="430"/>
    </g>
    
    <!-- Neural network nodes -->
    <g filter="url(#blur)">
      <!-- Center cluster -->
      <circle cx="216" cy="290" r="4" fill="rgba(255,60,60,0.8)"/>
      <circle cx="216" cy="290" r="8" fill="none" stroke="rgba(255,60,60,0.3)" stroke-width="1"/>
      
      <!-- Upper nodes -->
      <circle cx="80" cy="120" r="2.5" fill="rgba(255,40,40,0.6)"/>
      <circle cx="50" cy="80" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="120" cy="60" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="160" cy="90" r="2.5" fill="rgba(255,40,40,0.5)"/>
      <circle cx="30" cy="140" r="1.5" fill="rgba(255,20,20,0.3)"/>
      <circle cx="70" cy="180" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="130" cy="200" r="2" fill="rgba(255,30,30,0.4)"/>
      
      <circle cx="350" cy="130" r="2.5" fill="rgba(255,40,40,0.6)"/>
      <circle cx="380" cy="90" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="310" cy="70" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="270" cy="100" r="2.5" fill="rgba(255,40,40,0.5)"/>
      <circle cx="400" cy="150" r="1.5" fill="rgba(255,20,20,0.3)"/>
      <circle cx="360" cy="190" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="300" cy="210" r="2" fill="rgba(255,30,30,0.4)"/>
      
      <!-- Cross intersection nodes -->
      <circle cx="216" cy="150" r="3" fill="rgba(255,50,50,0.7)"/>
      <circle cx="136" cy="246" r="3" fill="rgba(255,50,50,0.7)"/>
      <circle cx="296" cy="246" r="3" fill="rgba(255,50,50,0.7)"/>
      <circle cx="136" cy="334" r="3" fill="rgba(255,50,50,0.7)"/>
      <circle cx="296" cy="334" r="3" fill="rgba(255,50,50,0.7)"/>
      <circle cx="216" cy="430" r="3" fill="rgba(255,50,50,0.7)"/>
      
      <!-- Lower nodes -->
      <circle cx="90" cy="400" r="2.5" fill="rgba(255,40,40,0.6)"/>
      <circle cx="50" cy="450" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="130" cy="470" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="80" cy="520" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="170" cy="510" r="2.5" fill="rgba(255,40,40,0.5)"/>
      <circle cx="140" cy="550" r="1.5" fill="rgba(255,20,20,0.3)"/>
      <circle cx="200" cy="560" r="2" fill="rgba(255,30,30,0.4)"/>
      
      <circle cx="340" cy="410" r="2.5" fill="rgba(255,40,40,0.6)"/>
      <circle cx="380" cy="460" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="300" cy="480" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="350" cy="530" r="2" fill="rgba(255,30,30,0.4)"/>
      <circle cx="260" cy="520" r="2.5" fill="rgba(255,40,40,0.5)"/>
      <circle cx="290" cy="560" r="1.5" fill="rgba(255,20,20,0.3)"/>
      <circle cx="230" cy="570" r="2" fill="rgba(255,30,30,0.4)"/>
    </g>
    
    <!-- Scattered dim nodes -->
    <g>
      <circle cx="40" cy="250" r="1" fill="rgba(150,20,20,0.3)"/>
      <circle cx="390" cy="280" r="1" fill="rgba(150,20,20,0.3)"/>
      <circle cx="60" cy="350" r="1" fill="rgba(150,20,20,0.3)"/>
      <circle cx="370" cy="350" r="1" fill="rgba(150,20,20,0.3)"/>
      <circle cx="100" cy="580" r="1" fill="rgba(150,20,20,0.2)"/>
      <circle cx="330" cy="590" r="1" fill="rgba(150,20,20,0.2)"/>
      <circle cx="200" cy="50" r="1" fill="rgba(150,20,20,0.2)"/>
      <circle cx="230" cy="50" r="1" fill="rgba(150,20,20,0.2)"/>
    </g>
  </svg>

  <!-- Cross with neural network nodes -->
  <div class="cross-container">
    <div class="cross-vertical"></div>
    <div class="cross-horizontal"></div>
    
    <!-- Nodes along the cross -->
    <div class="node large" style="left: -1px; top: -140px;"></div>
    <div class="node" style="left: 0px; top: -90px;"></div>
    <div class="node dim" style="left: 1px; top: -50px;"></div>
    
    <div class="node large" style="left: -90px; top: -2px;"></div>
    <div class="node" style="left: -55px; top: -1px;"></div>
    <div class="node dim" style="left: 55px; top: -1px;"></div>
    <div class="node" style="left: 85px; top: 0px;"></div>
    
    <div class="node dim" style="left: -1px; top: 40px;"></div>
    <div class="node" style="left: 0px; top: 80px;"></div>
    <div class="node large" style="left: -1px; top: 130px;"></div>
  </div>

  <!-- Blood drips from top -->
  <div class="drip" style="left: 15%; height: 60px;"></div>
  <div class="drip" style="left: 35%; height: 40px;"></div>
  <div class="drip" style="left: 55%; height: 75px;"></div>
  <div class="drip" style="left: 72%; height: 35px;"></div>
  <div class="drip" style="left: 88%; height: 50px;"></div>

  <!-- Floating particles -->
  <div class="particle" style="left: 10%; top: 20%; width: 3px; height: 3px; animation-delay: 0s;"></div>
  <div class="particle" style="left: 85%; top: 15%; width: 2px; height: 2px; animation-delay: 1s;"></div>
  <div class="particle" style="left: 20%; top: 70%; width: 3px; height: 3px; animation-delay: 2s;"></div>
  <div class="particle" style="left: 75%; top: 65%; width: 2px; height: 2px; animation-delay: 3s;"></div>
  <div class="particle" style="left: 45%; top: 80%; width: 2px; height: 2px; animation-delay: 4s;"></div>
  <div class="particle" style="left: 60%; top: 25%; width: 3px; height: 3px; animation-delay: 1.5s;"></div>
  <div class="particle" style="left: 30%; top: 45%; width: 2px; height: 2px; animation-delay: 2.5s;"></div>

  <!-- Title -->
  <div class="title-container">
    <div class="title-the">The</div>
    <div class="title-main">Algorithm</div>
    <div class="title-of">of</div>
    <div class="title-belief">Belief</div>
  </div>

  <!-- Subtitle -->
  <div class="subtitle-container">
    <div class="subtitle-line"></div>
    <div class="subtitle-finding">Finding</div>
    <div class="subtitle-god">God</div>
    <div class="subtitle-innovation">in Innovation</div>
  </div>

  <!-- Author -->
  <div class="author-container">
    <div class="author-line"></div>
    <div class="author-text">Your Name Here</div>
  </div>

  <!-- Effects -->
  <div class="edge-burn"></div>
  <div class="scanlines"></div>
</div>

</body>
</html>
